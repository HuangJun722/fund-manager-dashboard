name: Update Fund Dashboard

concurrency:
  group: fund-dashboard-pages
  cancel-in-progress: true

on:
  schedule:
    # 18:30 Asia/Shanghai, Monday-Friday. The script also skips weekends.
    - cron: "30 10 * * 1-5"
  push:
    branches: [main]
    paths:
      - "fund_manager_v4.html"
      - "scripts/*.js"
      - "config/*.json"
      - ".github/workflows/*.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: Asia/Shanghai
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check HTML
        run: node scripts/check_html.js

      - name: Sync quote cache
        run: node scripts/sync_quotes.js

      - name: Build GitHub Pages site
        run: node scripts/build_site.js

      - name: Verify output
        run: |
          if [ ! -f "docs/index.html" ]; then
            echo "ERROR: docs/index.html not generated"
            exit 1
          fi
          if [ ! -f "docs/data/quotes_cache_latest.json" ]; then
            echo "ERROR: docs/data/quotes_cache_latest.json not generated"
            exit 1
          fi
          SIZE=$(wc -c < docs/index.html)
          echo "HTML size: $SIZE bytes"
          if [ "$SIZE" -lt 5000 ]; then
            echo "ERROR: docs/index.html is too small"
            exit 1
          fi

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/quotes_cache_latest.json docs/
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update fund dashboard $(TZ=Asia/Shanghai date +%Y-%m-%d\ %H:%M)"
            git push
          fi

